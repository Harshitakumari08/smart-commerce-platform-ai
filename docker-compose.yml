version: "3.9"
services:
  backend:
    build:
      context: ./commerce-backend
    container_name: smart-commerce-backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/smartcommerce
      SPRING_DATASOURCE_USERNAME: smartcommerce
      SPRING_DATASOURCE_PASSWORD: smartcommerce
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379

  frontend:
    build:
      context: ./commerce-frontend
    container_name: smart-commerce-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  postgres:
    image: postgres:16
    container_name: smart-commerce-postgres
    environment:
      POSTGRES_DB: smartcommerce
      POSTGRES_USER: smartcommerce
      POSTGRES_PASSWORD: smartcommerce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: smart-commerce-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
