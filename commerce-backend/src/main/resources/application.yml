server:
  port: 8080

spring:
  application:
    name: smart-commerce-backend
  datasource:
    url: jdbc:postgresql://postgres:5432/smartcommerce
    username: smartcommerce
    password: smartcommerce
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  data:
    redis:
      host: redis
      port: 6379
      password:
  cache:
    type: redis

jwt:
  secret: change-me-in-production-secure-enough-secret-key-32-chars
  access-token-expiration-ms: 3600000
  refresh-token-expiration-ms: 604800000

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    com.smartcommerce: DEBUG
  file:
    name: logs/smart-commerce.log

management:
  endpoints:
    web:
      exposure:
        include: health,info
